apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
# Service B Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
      - name: service-b
        image: saikiran8050/service-b:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: service-b
  namespace: dev
  labels:
    app: service-b

spec:
  selector:
    app: service-b
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3001
---
# Service A Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
      - name: service-a
        image: saikiran8050/service-a:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: SERVICE_B_URL
          value: "http://service-b.dev.svc.cluster.local:80"
---
apiVersion: v1
kind: Service
metadata:
  name: service-a
  namespace: dev
  labels:
    app: service-a

spec:
  type: NodePort
  selector:
    app: service-a
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 3000


apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: service-a-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: service-a.rules
    rules:
    - alert: PodRestart
      expr: changes(kube_pod_container_status_restarts_total{namespace="dev"}[5m]) > 0
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.pod }} restarted in namespace {{ $labels.namespace }}"
        description: "A pod in the dev namespace has restarted in the last 5 minutes."
    - alert: HighCpuUsage
      expr: sum(rate(container_cpu_usage_seconds_total{container!="",namespace="dev"}[5m])) by (pod) > 0.8
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage on pod {{ $labels.pod }}"
        description: "Pod {{ $labels.pod }} in dev namespace is using more than 80% CPU."

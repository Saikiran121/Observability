apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: a-service-service-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: service-a

  namespaceSelector:
    matchNames:
    - dev
  endpoints:
  - interval: 2s
    port: http
    path: /metrics
